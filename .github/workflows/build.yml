name: Build module

# Builds the JKA server game module (`jampgame`) as a shared library for every
# arch the engine loads, in BOTH the release and debug profiles, and packages each
# as a versioned zip. The file *inside* each zip keeps the exact arch-suffixed name
# the engine expects at load time (`"jampgame" ARCH_STRING DLL_EXT`, see q_platform.h);
# the profile/arch/version live in the zip name, never in the module filename (the
# engine would refuse to load a renamed module):
#
#   Windows 32-bit  x86      jampgamex86.dll
#   Windows 64-bit  x86_64   jampgamex86_64.dll
#   Linux   32-bit  i386     jampgamei386.so
#   Linux   64-bit  x86_64   jampgamex86_64.so
#
# Artifact / zip naming:
#   jampgame-<arch>-<platform>-<profile>-<version>.zip   (contains the engine-named module)
#   e.g. jampgame-x86_64-windows-release-v1.2.3.zip   (on a v* tag)
#        jampgame-x86_64-windows-debug-a1b2c3d.zip    (on a branch/PR push, short SHA)
#
# 4 targets x 2 profiles = 8 zips. NOTE: the debug build is a real link gate — the
# cdylib's *release* link catches undefined symbols that a local debug `cargo build`
# tolerates on macOS/Linux, and Windows MSVC catches them in either profile.
#
# The whole build matrix is gated behind a `test` job (unit tests + oracle parity
# tests); builds only run if the tests pass. On pull requests and pushes to master
# this runs test -> build; on v* tags it additionally runs build -> release.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed by the release job to attach assets on tag pushes

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # the oracle parity tests need the submodule headers

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        # Pushes (master / tags) only — PRs build clean from scratch for a
        # trustworthy, cache-free signal.
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: test-cargo-

      - name: Unit tests
        run: cargo test

      - name: Oracle parity tests
        # single-threaded: the RNG parity tests share one global C seed
        run: cargo test --features oracle -- --test-threads=1

  build:
    name: ${{ matrix.target.module }} (${{ matrix.profile }})
    needs: test # multi-arch build only runs if the test + oracle suites pass
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        profile: [release, debug]
        target:
          - module: jampgamex86.dll
            runner: windows-latest
            triple: i686-pc-windows-msvc
            cargo_artifact: jampgame.dll
            arch: x86
            platform: windows
          - module: jampgamex86_64.dll
            runner: windows-latest
            triple: x86_64-pc-windows-msvc
            cargo_artifact: jampgame.dll
            arch: x86_64
            platform: windows
          - module: jampgamei386.so
            runner: ubuntu-latest
            triple: i686-unknown-linux-gnu
            cargo_artifact: libjampgame.so
            arch: i386
            platform: linux
          - module: jampgamex86_64.so
            runner: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            cargo_artifact: libjampgame.so
            arch: x86_64
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Install 32-bit Linux cross deps
        if: matrix.target.triple == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Cache cargo
        # Pushes (master / tags) only — PRs build clean from scratch for a
        # trustworthy, cache-free signal.
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target.triple }}-${{ matrix.profile }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ matrix.target.triple }}-${{ matrix.profile }}-cargo-

      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF_NAME}"          # the v* tag, e.g. v1.2.3
          else
            ver="${GITHUB_SHA::7}"            # short commit SHA for branch/PR builds
          fi
          echo "VERSION=${ver}" >> "$GITHUB_ENV"
          echo "Version stamp: ${ver}"

      - name: Build (${{ matrix.profile }} cdylib)
        shell: bash
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build --release --target ${{ matrix.target.triple }}
            echo "PROFILE_DIR=release" >> "$GITHUB_ENV"
          else
            cargo build --target ${{ matrix.target.triple }}
            echo "PROFILE_DIR=debug" >> "$GITHUB_ENV"
          fi

      - name: Package zip
        shell: bash
        run: |
          src="target/${{ matrix.target.triple }}/${PROFILE_DIR}/${{ matrix.target.cargo_artifact }}"
          test -f "$src" || { echo "::error::built module not found at $src"; exit 1; }
          zip_name="jampgame-${{ matrix.target.arch }}-${{ matrix.target.platform }}-${{ matrix.profile }}-${VERSION}.zip"
          rm -rf package dist
          mkdir -p package dist
          # rename to the engine-required load name *inside* the archive
          cp "$src" "package/${{ matrix.target.module }}"
          # 7z is preinstalled on both windows-latest and ubuntu-latest runners;
          # cd in so the archive holds just the bare module at top level
          ( cd package && 7z a -tzip tmp.zip "${{ matrix.target.module }}" >/dev/null )
          mv package/tmp.zip "dist/${zip_name}"
          echo "ZIP_NAME=${zip_name}" >> "$GITHUB_ENV"
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error

  release:
    name: Attach to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected zips
        run: ls -lR dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip # both release and debug zips, all 4 arches
          fail_on_unmatched_files: true
